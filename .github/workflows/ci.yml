name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC
            os: ubuntu-24.04
            qt_arch: linux_gcc_64
          - name: Windows MSVC
            os: windows-2022
            qt_arch: win64_msvc2022_64
            cmake_extra: -A x64
          - name: Windows MinGW
            os: windows-2022
            qt_arch: win64_mingw
            qt_tools: tools_mingw1310
            cmake_extra: -G "MinGW Makefiles"

    steps:
      - uses: actions/checkout@v6

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          arch: ${{ matrix.qt_arch }}
          tools: ${{ matrix.qt_tools }}

      - name: Add MinGW to PATH
        if: matrix.qt_tools != ''
        shell: bash
        run: echo "$IQTA_TOOLS/mingw1310_64/bin" >> "$GITHUB_PATH"

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DQTCOROUTINE_BUILD_TESTS=ON -DQTCOROUTINE_BUILD_EXAMPLES=ON ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Debug

      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure

  format:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: clang-format --dry-run --Werror include/QtCoroutine/*.hpp tests/*.cpp examples/*.cpp
